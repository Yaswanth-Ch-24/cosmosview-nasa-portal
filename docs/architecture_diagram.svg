<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.4"/></filter>
    <filter id="sh2"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/></filter>
    <linearGradient id="nasaBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#050810"/></linearGradient>
    <linearGradient id="djangoBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d2a0d"/><stop offset="100%" stop-color="#071507"/></linearGradient>
    <linearGradient id="browserBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0a1020"/></linearGradient>
    <linearGradient id="dbBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a1a0a"/><stop offset="100%" stop-color="#0d0d05"/></linearGradient>
    <radialGradient id="star"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>

  <!-- Space background -->
  <rect width="900" height="600" fill="#030712"/>
  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="45" cy="65" r="1"/><circle cx="120" cy="90" r="1.5"/><circle cx="200" cy="45" r="1"/>
    <circle cx="280" cy="80" r="1"/><circle cx="380" cy="55" r="1.5"/><circle cx="460" cy="75" r="1"/>
    <circle cx="560" cy="40" r="1"/><circle cx="650" cy="70" r="1.5"/><circle cx="740" cy="50" r="1"/>
    <circle cx="830" cy="80" r="1"/><circle cx="880" cy="45" r="1.5"/>
    <circle cx="70" cy="520" r="1"/><circle cx="160" cy="540" r="1.5"/><circle cx="250" cy="510" r="1"/>
    <circle cx="790" cy="530" r="1"/><circle cx="860" cy="555" r="1.5"/>
  </g>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="38" fill="#0f172a" fill-opacity="0.9"/>
  <text x="450" y="15" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CosmosView — System Architecture Diagram</text>
  <text x="450" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">Python · Django · NASA APOD API · Mars Rover API · Yaswanth Chlliboina</text>

  <!-- ══ NASA API SERVERS (top) ══ -->
  <g filter="url(#sh)">
    <rect x="75" y="70" width="175" height="120" rx="10" fill="url(#nasaBg)" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="82" y="77" width="161" height="107" rx="7" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- NASA logo area -->
    <circle cx="162" cy="108" r="22" fill="#1d3a7a" stroke="#3b82f6" stroke-width="2"/>
    <text x="162" y="104" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">NASA</text>
    <text x="162" y="116" text-anchor="middle" fill="#3b82f6" font-size="7">api.nasa.gov</text>
    <!-- Endpoints -->
    <rect x="85" y="140" width="160" height="12" rx="3" fill="#0d1f4a"/>
    <text x="92" y="150" fill="#93c5fd" font-size="7" font-family="'Courier New', monospace">/planetary/apod</text>
    <rect x="85" y="155" width="160" height="12" rx="3" fill="#0d1f4a"/>
    <text x="92" y="165" fill="#93c5fd" font-size="7" font-family="'Courier New', monospace">/mars-photos/api/v1</text>
  </g>
  <text x="162" y="65" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">NASA Public APIs</text>

  <!-- ══ DJANGO BACKEND (center) ══ -->
  <g filter="url(#sh)">
    <rect x="320" y="70" width="250" height="380" rx="10" fill="url(#djangoBg)" stroke="#16a34a" stroke-width="2.5"/>
    <rect x="327" y="77" width="236" height="367" rx="7" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- Django label -->
    <text x="445" y="98" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Django Backend</text>
    <text x="445" y="112" text-anchor="middle" fill="#16a34a" font-size="8">Python 3.10 · Django 4.2</text>

    <!-- URL Router -->
    <rect x="335" y="122" width="220" height="38" rx="5" fill="#0d1f0d" stroke="#16a34a" stroke-width="1.5"/>
    <text x="445" y="136" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="bold">URL Router (urls.py)</text>
    <text x="350" y="150" fill="#86efac" font-size="6.5" font-family="'Courier New', monospace">/  →  /mars/  →  /favorites/</text>

    <!-- APOD App -->
    <rect x="335" y="172" width="100" height="70" rx="5" fill="#071507" stroke="#15803d" stroke-width="1.5"/>
    <text x="385" y="186" text-anchor="middle" fill="#4ade80" font-size="7.5" font-weight="bold">APOD App</text>
    <text x="350" y="199" fill="#86efac" font-size="6.5">views.py</text>
    <text x="350" y="210" fill="#86efac" font-size="6.5">urls.py</text>
    <text x="350" y="221" fill="#86efac" font-size="6.5">templates/</text>
    <text x="350" y="232" fill="#86efac" font-size="6.5">fetch_apod()</text>

    <!-- Mars App -->
    <rect x="455" y="172" width="100" height="70" rx="5" fill="#071507" stroke="#15803d" stroke-width="1.5"/>
    <text x="505" y="186" text-anchor="middle" fill="#4ade80" font-size="7.5" font-weight="bold">Mars App</text>
    <text x="465" y="199" fill="#86efac" font-size="6.5">views.py</text>
    <text x="465" y="210" fill="#86efac" font-size="6.5">urls.py</text>
    <text x="465" y="221" fill="#86efac" font-size="6.5">templates/</text>
    <text x="465" y="232" fill="#86efac" font-size="6.5">Rover filter</text>

    <!-- Favorites App -->
    <rect x="335" y="255" width="100" height="70" rx="5" fill="#071507" stroke="#15803d" stroke-width="1.5"/>
    <text x="385" y="269" text-anchor="middle" fill="#4ade80" font-size="7.5" font-weight="bold">Favorites</text>
    <text x="350" y="282" fill="#86efac" font-size="6.5">views.py</text>
    <text x="350" y="293" fill="#86efac" font-size="6.5">session store</text>
    <text x="350" y="304" fill="#86efac" font-size="6.5">add/remove</text>
    <text x="350" y="315" fill="#86efac" font-size="6.5">favorites list</text>

    <!-- Settings -->
    <rect x="455" y="255" width="100" height="70" rx="5" fill="#071507" stroke="#15803d" stroke-width="1.5"/>
    <text x="505" y="269" text-anchor="middle" fill="#4ade80" font-size="7.5" font-weight="bold">Settings</text>
    <text x="465" y="282" fill="#86efac" font-size="6.5">NASA_API_KEY</text>
    <text x="465" y="293" fill="#86efac" font-size="6.5">.env file</text>
    <text x="465" y="304" fill="#86efac" font-size="6.5">SECRET_KEY</text>
    <text x="465" y="315" fill="#86efac" font-size="6.5">DEBUG=True</text>

    <!-- Templates -->
    <rect x="335" y="338" width="220" height="40" rx="5" fill="#0d1f0d" stroke="#16a34a" stroke-width="1.5"/>
    <text x="445" y="352" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="bold">Templates (Jinja2 / DTL)</text>
    <text x="350" y="368" fill="#86efac" font-size="6.5">base.html  ·  home.html  ·  mars.html  ·  favorites.html</text>

    <!-- Static -->
    <rect x="335" y="390" width="100" height="42" rx="5" fill="#0d1f0d" stroke="#16a34a" stroke-width="1.5"/>
    <text x="385" y="405" text-anchor="middle" fill="#4ade80" font-size="7.5" font-weight="bold">Static Files</text>
    <text x="350" y="420" fill="#86efac" font-size="6">CSS · JS · Images</text>

    <!-- manage.py -->
    <rect x="455" y="390" width="100" height="42" rx="5" fill="#0d1f0d" stroke="#16a34a" stroke-width="1.5"/>
    <text x="505" y="405" text-anchor="middle" fill="#4ade80" font-size="7.5" font-weight="bold">manage.py</text>
    <text x="465" y="420" fill="#86efac" font-size="6">runserver · migrate</text>
  </g>
  <text x="445" y="63" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Django Backend (Python)</text>

  <!-- ══ DATABASE (right-top) ══ -->
  <g filter="url(#sh2)">
    <rect x="645" y="70" width="200" height="110" rx="10" fill="url(#dbBg)" stroke="#ca8a04" stroke-width="2"/>
    <rect x="652" y="77" width="186" height="97" rx="7" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- DB cylinder -->
    <ellipse cx="680" cy="105" rx="20" ry="8" fill="#2a2a08" stroke="#d97706" stroke-width="1.5"/>
    <rect x="660" y="105" width="40" height="45" fill="#1a1a05" stroke="#d97706" stroke-width="1" stroke-dasharray="0"/>
    <rect x="659" y="104" width="42" height="3" fill="#2a2a08"/>
    <ellipse cx="680" cy="150" rx="20" ry="8" fill="#2a2a08" stroke="#d97706" stroke-width="1.5"/>
    <text x="680" y="128" text-anchor="middle" fill="#fbbf24" font-size="7.5">SQLite</text>
    <text x="680" y="141" text-anchor="middle" fill="#f59e0b" font-size="6.5">db.sqlite3</text>
    <!-- Tables -->
    <text x="718" y="105" fill="#fde68a" font-size="7" font-weight="bold">Tables:</text>
    <text x="718" y="118" fill="#fcd34d" font-size="6.5">django_session</text>
    <text x="718" y="130" fill="#fcd34d" font-size="6.5">auth_user</text>
    <text x="718" y="142" fill="#fcd34d" font-size="6.5">favorites (session)</text>
  </g>
  <text x="745" y="65" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">Database (SQLite/MySQL)</text>

  <!-- ══ BROWSER (right-bottom) ══ -->
  <g filter="url(#sh)">
    <rect x="635" y="225" width="220" height="225" rx="10" fill="url(#browserBg)" stroke="#7c3aed" stroke-width="2"/>
    <rect x="642" y="232" width="206" height="212" rx="7" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- Browser chrome -->
    <rect x="648" y="238" width="194" height="20" rx="4" fill="#1e293b"/>
    <circle cx="660" cy="248" r="4" fill="#ef4444"/><circle cx="672" cy="248" r="4" fill="#eab308"/>
    <circle cx="684" cy="248" r="4" fill="#22c55e"/>
    <rect x="692" y="243" width="140" height="10" rx="5" fill="#334155"/>
    <text x="762" y="251" text-anchor="middle" fill="#64748b" font-size="6.5">localhost:8000</text>
    <!-- Page content -->
    <rect x="648" y="261" width="194" height="110" rx="3" fill="#020617"/>
    <!-- Dark space header -->
    <rect x="648" y="261" width="194" height="25" fill="#0a0f1a"/>
    <text x="745" y="274" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="bold">🌌 CosmosView</text>
    <text x="680" y="274" fill="#475569" font-size="6.5">APOD</text>
    <text x="710" y="274" fill="#475569" font-size="6.5">Mars</text>
    <text x="736" y="274" fill="#475569" font-size="6.5">⭐Fav</text>
    <!-- APOD image placeholder -->
    <rect x="655" y="290" width="100" height="70" rx="3" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="705" y="325" text-anchor="middle" fill="#1e3a5f" font-size="22">🌌</text>
    <!-- Text content -->
    <rect x="762" y="290" width="74" height="10" rx="2" fill="#1e3a5f"/>
    <rect x="762" y="305" width="74" height="7" rx="2" fill="#152535"/>
    <rect x="762" y="316" width="60" height="7" rx="2" fill="#152535"/>
    <rect x="762" y="327" width="70" height="7" rx="2" fill="#152535"/>
    <rect x="762" y="338" width="50" height="7" rx="2" fill="#152535"/>
    <rect x="762" y="350" width="74" height="12" rx="4" fill="#1d4ed8"/>
    <text x="799" y="359" text-anchor="middle" fill="white" font-size="6">⭐ Save</text>
    <!-- Pages list -->
    <rect x="648" y="373" width="194" height="52" rx="3" fill="#0f172a"/>
    <text x="745" y="388" text-anchor="middle" fill="#6366f1" font-size="7.5" font-weight="bold">Pages</text>
    <text x="660" y="400" fill="#818cf8" font-size="6.5">/ APOD · Date picker · HD image</text>
    <text x="660" y="411" fill="#818cf8" font-size="6.5">/mars/ · Rover · Camera filter</text>
    <text x="660" y="422" fill="#818cf8" font-size="6.5">/favorites/ · View · Remove</text>
  </g>
  <text x="745" y="220" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold">Web Browser (User)</text>

  <!-- ══ ARROWS / FLOW ══ -->
  <!-- NASA → Django (HTTPS GET) -->
  <polyline points="250,130 320,130" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="320,130 312,126 312,134" fill="#3b82f6"/>
  <text x="285" y="122" text-anchor="middle" fill="#3b82f6" font-size="7.5" font-weight="bold">HTTPS</text>
  <text x="285" y="133" text-anchor="middle" fill="#60a5fa" font-size="7">GET + API Key</text>
  <!-- Django → NASA request -->
  <polyline points="320,150 250,150" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="250,150 258,146 258,154" fill="#22c55e"/>
  <text x="285" y="165" text-anchor="middle" fill="#4ade80" font-size="7">JSON Response</text>

  <!-- Browser → Django (HTTP) -->
  <polyline points="635,300 570,300" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <polygon points="570,300 578,296 578,304" fill="#8b5cf6"/>
  <text x="600" y="292" text-anchor="middle" fill="#a78bfa" font-size="7.5" font-weight="bold">HTTP Request</text>
  <!-- Django → Browser (HTML) -->
  <polyline points="570,320 635,320" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="635,320 627,316 627,324" fill="#7c3aed"/>
  <text x="600" y="335" text-anchor="middle" fill="#8b5cf6" font-size="7">HTML Response</text>

  <!-- Django → DB -->
  <polyline points="545,160 645,160" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <polygon points="645,160 637,156 637,164" fill="#ca8a04"/>
  <polyline points="645,175 545,175" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="545,175 553,171 553,179" fill="#d97706"/>
  <text x="595" y="155" text-anchor="middle" fill="#fbbf24" font-size="7">ORM Query</text>
  <text x="595" y="183" text-anchor="middle" fill="#f59e0b" font-size="7">QuerySet</text>

  <!-- ══ HOW TO RUN ══ -->
  <rect x="55" y="430" width="250" height="120" rx="8" fill="#0f1a0f" stroke="#16a34a" stroke-width="1.5"/>
  <text x="180" y="447" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">How to Run</text>
  <text x="70" y="463" fill="#86efac" font-size="7" font-family="'Courier New', monospace">git clone .../cosmosview-nasa-portal</text>
  <text x="70" y="477" fill="#86efac" font-size="7" font-family="'Courier New', monospace">pip install -r requirements.txt</text>
  <text x="70" y="491" fill="#86efac" font-size="7" font-family="'Courier New', monospace">cp .env.example .env</text>
  <text x="70" y="505" fill="#fbbf24" font-size="7" font-family="'Courier New', monospace"># Add NASA_API_KEY=your_key</text>
  <text x="70" y="519" fill="#86efac" font-size="7" font-family="'Courier New', monospace">python manage.py migrate</text>
  <text x="70" y="533" fill="#86efac" font-size="7" font-family="'Courier New', monospace">python manage.py runserver</text>

  <!-- Legend -->
  <rect x="325" y="468" width="270" height="80" rx="8" fill="#0f0f1f" stroke="#4b5563" stroke-width="1"/>
  <text x="460" y="485" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold">Arrow Legend</text>
  <g font-size="7.5" fill="#9ca3af">
    <line x1="340" y1="498" x2="370" y2="498" stroke="#3b82f6" stroke-width="2.5"/><text x="375" y="502">HTTPS GET (Django → NASA API)</text>
    <line x1="340" y1="513" x2="370" y2="513" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/><text x="375" y="517">JSON response (NASA → Django)</text>
    <line x1="340" y1="528" x2="370" y2="528" stroke="#8b5cf6" stroke-width="2.5"/><text x="375" y="532">HTTP request (Browser → Django)</text>
    <line x1="340" y1="540" x2="370" y2="540" stroke="#ca8a04" stroke-width="2"/><text x="375" y="544">ORM / DB queries</text>
  </g>
</svg>
