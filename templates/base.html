<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmosView — NASA Astronomy Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; color: #e0e6ff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    nav {
      background: rgba(10,14,26,0.95);
      border-bottom: 1px solid #1e2d5a;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .nav-brand {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #4f8ef7, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    nav a { color: #8899cc; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #4f8ef7; }
    .nav-right { margin-left: auto; }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
    }
    .btn {
      display: inline-block; padding: 0.5rem 1.2rem;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; font-weight: 500;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 1px solid #4f8ef7;
      color: #4f8ef7;
    }
    .tag {
      display: inline-block; padding: 2px 10px;
      background: rgba(79,142,247,0.15); color: #4f8ef7;
      border-radius: 20px; font-size: 0.75rem; font-weight: 500;
    }

    footer {
      text-align: center; padding: 2rem;
      color: #445; font-size: 0.8rem;
      border-top: 1px solid #1e2d5a; margin-top: 4rem;
    }
    footer a { color: #4f8ef7; text-decoration: none; }

    .flash { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .flash.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .flash.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">🌌 CosmosView</a>
    <a href="/" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>APOD</a>
    <a href="/mars/" {% if 'mars' in request.path %}class="active"{% endif %}>Mars Rover</a>
    <a href="/favorites/" {% if 'favorites' in request.path %}class="active"{% endif %}>⭐ Favorites</a>
    <div class="nav-right">
      <span style="font-size:0.75rem;color:#445">By Yaswanth Chlliboina</span>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>
    Built with Python & Django · Data from <a href="https://api.nasa.gov" target="_blank">NASA APIs</a> ·
    <a href="https://github.com/Yaswanth-Ch-24/cosmosview-nasa-portal" target="_blank">GitHub</a> ·
    <a href="https://www.linkedin.com/in/yaswanth-chlliboina/" target="_blank">LinkedIn</a>
  </footer>
</body>
</html>
